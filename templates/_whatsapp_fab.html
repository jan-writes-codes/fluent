{% comment %}
  Floating WhatsApp button — lets visitors contact Davit directly with one tap.
  Included on the public-facing pages. Self-contained (inline style + svg).
{% endcomment %}
<style>
  .wa-fab {
    position: fixed; right: 20px; bottom: 20px; z-index: 900;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 18px 12px 14px; border-radius: 999px;
    background: #25d366; color: #fff; text-decoration: none;
    font-family: var(--font-body, ui-sans-serif, system-ui, sans-serif);
    font-weight: 600; font-size: 15px; line-height: 1;
    box-shadow: 0 14px 30px -8px rgba(37,211,102,0.55), 0 4px 10px rgba(0,0,0,0.12);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .wa-fab:hover { transform: translateY(-2px); box-shadow: 0 18px 36px -8px rgba(37,211,102,0.6), 0 6px 14px rgba(0,0,0,0.15); }
  .wa-fab svg { width: 24px; height: 24px; flex: none; }
  .wa-fab .wa-label { white-space: nowrap; }
  @media (max-width: 560px) {
    .wa-fab { right: 16px; bottom: 16px; padding: 12px; }
    .wa-fab .wa-label { display: none; }
    /* Keep the glow's downward reach (offset + blur + spread) under the 16px
       gap to the viewport edge: iOS Safari doesn't paint page shadows into
       its toolbar area, so a longer shadow gets sliced off at that boundary
       with a visible straight edge. */
    .wa-fab, .wa-fab:hover {
      box-shadow: 0 5px 12px -4px rgba(37,211,102,0.5), 0 2px 6px rgba(0,0,0,0.12);
      transform: none;
    }
  }
  @media print { .wa-fab { display: none; } }
</style>
